<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rosas para mi Niña Lalys 🌹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { display:block; }

  #label {
    position: fixed;
    bottom: 24px;
    width: 100%;
    text-align: center;
    pointer-events: none;
  }
  #label span {
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-size: clamp(12px, 2.4vw, 22px);
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(90deg,
      #8B6914 0%, #D4A017 20%, #FFD700 35%,
      #FFFACD 50%, #FFD700 65%, #D4A017 80%, #8B6914 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite, fade 3s ease-in-out infinite;
    display: inline-block;
    text-shadow: none;
    filter: drop-shadow(0 0 8px rgba(255,200,0,0.5));
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  @keyframes fade { 0%,100%{opacity:.4} 50%{opacity:1} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label"><span>✦ &nbsp; Rosas para mi Niña Lalys &nbsp; ✦</span></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY, SC;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W/2; CY = H/2;
  SC = Math.min(W,H) / 700;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════
//  ESTRELLAS (800, 3 tipos)
// ══════════════════════════════════════════════
const STARS = Array.from({length:800}, () => {
  const t = Math.random() < 0.07 ? 1 : Math.random() < 0.05 ? 2 : 0;
  return {
    x: Math.random(), y: Math.random(),
    r: t===1 ? Math.random()*2.2+0.8 : t===2 ? Math.random()*1.2+0.4 : Math.random()*1.3+0.15,
    ph: Math.random()*Math.PI*2,
    sp: 0.003+Math.random()*0.022,
    type: t,
    col: t===1?'#ffe680': t===2?'#c8e6ff':'#ffffff',
  };
});

function drawSpike(x,y,r,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha*0.55;
  ctx.strokeStyle = '#fff8e1';
  ctx.lineWidth   = r*0.45;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur  = r*4;
  ctx.beginPath(); ctx.moveTo(x-r*3.5,y); ctx.lineTo(x+r*3.5,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-r*3.5); ctx.lineTo(x,y+r*3.5); ctx.stroke();
  ctx.restore();
}

function drawStars(t) {
  for (const s of STARS) {
    const a = 0.08 + 0.88*(0.5+0.5*Math.sin(s.ph+t*s.sp));
    ctx.globalAlpha = a;
    ctx.shadowColor = s.type===1?'#ffd700': s.type===2?'#88bbff':'transparent';
    ctx.shadowBlur  = s.type===0 ? 0 : s.r*2.5;
    ctx.fillStyle   = s.col;
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fill();
    if (s.type===1 && s.r>1.8) drawSpike(s.x*W, s.y*H, s.r, a);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ══════════════════════════════════════════════
//  VÍA LÁCTEA
// ══════════════════════════════════════════════
function drawMilkyWay() {
  ctx.save();
  ctx.translate(CX,CY); ctx.rotate(-0.35);
  const mw = ctx.createLinearGradient(-W,0,W,0);
  mw.addColorStop(0,'rgba(0,0,0,0)');
  mw.addColorStop(0.3,'rgba(50,35,8,0.07)');
  mw.addColorStop(0.5,'rgba(70,50,12,0.12)');
  mw.addColorStop(0.7,'rgba(50,35,8,0.07)');
  mw.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mw;
  ctx.fillRect(-W,-H*0.18,W*2,H*0.36);
  ctx.restore();
}

// ══════════════════════════════════════════════
//  NEBULOSA
// ══════════════════════════════════════════════
function drawNebula() {
  const g = ctx.createRadialGradient(CX,CY,0,CX,CY,140*SC);
  g.addColorStop(0,'rgba(255,230,80,0.50)');
  g.addColorStop(0.4,'rgba(255,150,20,0.20)');
  g.addColorStop(0.8,'rgba(255,80,0,0.06)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  [{ox:.22,oy:.10,r:.35,c:'rgba(255,200,50,0.05)'},
   {ox:-.20,oy:-.18,r:.28,c:'rgba(255,100,30,0.035)'},
   {ox:.04,oy:-.25,r:.26,c:'rgba(160,60,200,0.025)'},
   {ox:-.08,oy:.22,r:.22,c:'rgba(30,80,180,0.018)'}]
  .forEach(({ox,oy,r,c})=>{
    const R=r*Math.min(W,H);
    const gn=ctx.createRadialGradient(CX+ox*W,CY+oy*H,0,CX+ox*W,CY+oy*H,R);
    gn.addColorStop(0,c); gn.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gn; ctx.fillRect(0,0,W,H);
  });
}

// ══════════════════════════════════════════════
//  POLVO ORBITAL
// ══════════════════════════════════════════════
const DUST = Array.from({length:220},()=>{
  const d=55+Math.random()*300;
  return {angle:Math.random()*Math.PI*2, dist:d,
    sp:(0.001+Math.random()*0.0028)*(Math.random()<.5?1:-1),
    r:Math.random()*1.8+0.25, ph:Math.random()*Math.PI*2};
});
function drawDust(t) {
  for (const s of DUST) {
    s.angle += s.sp;
    const a = 0.12+0.72*(0.5+0.5*Math.sin(s.ph+t*0.03));
    ctx.globalAlpha=a;
    ctx.fillStyle='#ffe082';
    ctx.shadowColor='#ffd600'; ctx.shadowBlur=5;
    ctx.beginPath();
    ctx.arc(CX+Math.cos(s.angle)*s.dist*SC, CY+Math.sin(s.angle)*s.dist*SC*0.46, s.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ══════════════════════════════════════════════════════════════
//  ROSA REALISTA AMARILLA
//
//  Estructura auténtica de una rosa:
//   • Sépalos verdes en la base
//   • Pétalos externos grandes curvados hacia afuera (cupped)
//   • Pétalos medios curvados formando copa
//   • Pétalos internos enrollados en espiral hacia el centro
//   • Centro en espiral cerrada (botón)
//   • Iluminación lateral, sombras internas, venas y textura
// ══════════════════════════════════════════════════════════════

// Dibuja UN pétalo realista curvado. Centrado en (0,0), apunta hacia -Y.
// len=longitud, w=ancho, curlX=curvatura lateral, tipY=curvatura de punta
function realisticPetal(len, w, curlX, tipCurl, innerShade) {
  // Contorno exterior del pétalo (forma de lágrima invertida curvada)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  // lado izquierdo
  ctx.bezierCurveTo(
    -w*0.55 + curlX*0.3,  -len*0.3,
    -w*0.45 + curlX,       -len*0.72 + tipCurl,
     0,                    -len + tipCurl*1.2
  );
  // lado derecho (simétrico)
  ctx.bezierCurveTo(
     w*0.45 + curlX,       -len*0.72 + tipCurl,
     w*0.55 + curlX*0.3,  -len*0.3,
     0,                     0
  );
  ctx.closePath();
}

function drawRose(size, glowMult) {
  const s = size;

  // ── SÉPALOS (debajo de los pétalos) ──────────────────
  const nSep = 5;
  for (let i=0; i<nSep; i++) {
    ctx.save();
    ctx.rotate((Math.PI*2/nSep)*i + 0.1);
    ctx.globalAlpha = 0.75;
    const sg = ctx.createLinearGradient(0,0,0,-s*0.55);
    sg.addColorStop(0,'#2e7d32');
    sg.addColorStop(0.6,'#388e3c');
    sg.addColorStop(1,'#1b5e20');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-s*0.12,-s*0.18, -s*0.08,-s*0.42, 0,-s*0.58);
    ctx.bezierCurveTo( s*0.08,-s*0.42,  s*0.12,-s*0.18, 0, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ─── PALETA DE COLORES DE ROSA AMARILLA REAL ───────────
  // Base exterior: amarillo pálido casi blanco
  // Medio: amarillo dorado cálido
  // Interior: ámbar-naranja profundo en las sombras
  // Puntas: amarillo-crema iluminado

  // ── CAPA 1: PÉTALOS EXTERIORES (5 pétalos abiertos, reflexión) ──
  const outerN = 5;
  for (let i=0; i<outerN; i++) {
    ctx.save();
    ctx.rotate((Math.PI*2/outerN)*i);
    const len = s*1.02, w = s*0.60;
    const curl = s*0.08;

    // Sombra del pétalo sobre sí mismo
    ctx.shadowColor = 'rgba(140,80,0,0.30)';
    ctx.shadowBlur  = s*0.4;

    const pg = ctx.createLinearGradient(0,0,0,-len);
    pg.addColorStop(0,   '#fff9e6');   // base iluminada
    pg.addColorStop(0.25,'#fce576');   // amarillo brillante
    pg.addColorStop(0.6, '#f9c31a');   // dorado cálido
    pg.addColorStop(1,   '#e8a500');   // ámbar en la punta
    ctx.fillStyle  = pg;
    ctx.globalAlpha = 0.92;
    realisticPetal(len, w, 0, curl, false);
    ctx.fill();

    // Sombra interna lateral (profundidad)
    ctx.shadowBlur = 0;
    const shadow = ctx.createLinearGradient(-w*0.5,0,0,-len*0.5);
    shadow.addColorStop(0,'rgba(150,80,0,0.18)');
    shadow.addColorStop(1,'rgba(150,80,0,0)');
    ctx.fillStyle  = shadow;
    ctx.globalAlpha = 0.55;
    realisticPetal(len, w, 0, curl, false);
    ctx.fill();

    // Vena central sutil
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth   = 0.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-len*0.78); ctx.stroke();

    ctx.restore();
  }

  // ── CAPA 2: PÉTALOS MEDIOS (5 pétalos, copa cerrada) ──
  const midN = 5;
  for (let i=0; i<midN; i++) {
    ctx.save();
    ctx.rotate((Math.PI*2/midN)*i + 0.38);
    const len = s*0.78, w = s*0.46;
    const curl = -s*0.04; // levemente curvados hacia adentro

    ctx.shadowColor = 'rgba(120,60,0,0.35)';
    ctx.shadowBlur  = s*0.35;

    const pg = ctx.createLinearGradient(0,0,0,-len);
    pg.addColorStop(0,   '#fffde0');
    pg.addColorStop(0.3, '#fde962');
    pg.addColorStop(0.65,'#f5b800');
    pg.addColorStop(1,   '#d48b00');
    ctx.fillStyle  = pg;
    ctx.globalAlpha = 0.94;
    realisticPetal(len, w, 0, curl, false);
    ctx.fill();

    ctx.shadowBlur = 0;
    // Sombra interna
    const sh2 = ctx.createRadialGradient(w*0.3,-len*0.5,0,0,-len*0.4,w*0.6);
    sh2.addColorStop(0,'rgba(130,70,0,0.22)');
    sh2.addColorStop(1,'rgba(130,70,0,0)');
    ctx.fillStyle  = sh2;
    ctx.globalAlpha = 0.5;
    realisticPetal(len, w, 0, curl, false);
    ctx.fill();

    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#9a6800';
    ctx.lineWidth   = 0.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-len*0.7); ctx.stroke();

    ctx.restore();
  }

  // ── CAPA 3: PÉTALOS INTERNOS (5, muy curvados hacia adentro) ──
  const innN = 5;
  for (let i=0; i<innN; i++) {
    ctx.save();
    ctx.rotate((Math.PI*2/innN)*i + 0.7);
    const len = s*0.52, w = s*0.32;
    const curl = -s*0.10;

    ctx.shadowColor = 'rgba(100,50,0,0.4)';
    ctx.shadowBlur  = s*0.3;

    const pg = ctx.createLinearGradient(0,0,0,-len);
    pg.addColorStop(0,   '#fffbe6');
    pg.addColorStop(0.4, '#fcd93a');
    pg.addColorStop(1,   '#c78b00');
    ctx.fillStyle  = pg;
    ctx.globalAlpha = 0.96;
    realisticPetal(len, w, 0, curl, true);
    ctx.fill();

    ctx.shadowBlur = 0;
    const sh3 = ctx.createLinearGradient(w*0.4,0,0,-len*0.6);
    sh3.addColorStop(0,'rgba(110,55,0,0.28)');
    sh3.addColorStop(1,'rgba(110,55,0,0)');
    ctx.fillStyle  = sh3;
    ctx.globalAlpha = 0.6;
    realisticPetal(len, w, 0, curl, true);
    ctx.fill();

    ctx.restore();
  }

  // ── CENTRO EN ESPIRAL (botón de la rosa) ──────────────
  // Espiral de pétalos diminutos enrollados
  const spiralN = 4;
  for (let i=0; i<spiralN; i++) {
    ctx.save();
    const progress = i/spiralN;
    const angle = progress * Math.PI * 2 * 1.5 + 1.2;
    const dist  = s * 0.08 * (1 - progress * 0.5);
    ctx.rotate(angle);
    ctx.translate(dist, 0);

    const miniLen = s*(0.22 - progress*0.08);
    const miniW   = s*(0.14 - progress*0.04);

    const mpg = ctx.createLinearGradient(0,0,0,-miniLen);
    mpg.addColorStop(0,'#fff8c0');
    mpg.addColorStop(0.5,'#f5c400');
    mpg.addColorStop(1,'#b87800');
    ctx.fillStyle  = mpg;
    ctx.globalAlpha = 0.97;
    realisticPetal(miniLen, miniW, 0, -miniLen*0.18, true);
    ctx.fill();

    ctx.restore();
  }

  // ── NÚCLEO CENTRAL ────────────────────────────────────
  ctx.globalAlpha = 1;
  ctx.shadowColor = `rgba(255,200,0,${0.4+(glowMult||0)*0.06})`;
  ctx.shadowBlur  = s*(1.8+(glowMult||0));
  const cg = ctx.createRadialGradient(-s*0.04,-s*0.05,0,0,0,s*0.18);
  cg.addColorStop(0,   '#fffde7');
  cg.addColorStop(0.35,'#ffe57f');
  cg.addColorStop(0.7, '#ffab00');
  cg.addColorStop(1,   '#7a4500');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(0,0,s*0.18,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Estambres diminutos
  ctx.globalAlpha = 0.65;
  for (let d=0; d<10; d++) {
    const ang = d*(Math.PI*2/10);
    const ex  = Math.cos(ang)*s*0.12;
    const ey  = Math.sin(ang)*s*0.12;
    ctx.strokeStyle='rgba(120,60,0,0.6)';
    ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(ex*0.3,ey*0.3); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.fillStyle='#bf6e00';
    ctx.beginPath(); ctx.arc(ex,ey,s*0.022,0,Math.PI*2); ctx.fill();
  }

  // ── LUZ ESPECULAR (brillo en pétalo exterior) ─────────
  ctx.globalAlpha = 0.28;
  const sp = ctx.createRadialGradient(-s*0.25,-s*0.38,0,-s*0.22,-s*0.35,s*0.28);
  sp.addColorStop(0,'rgba(255,255,255,0.95)');
  sp.addColorStop(0.4,'rgba(255,250,200,0.4)');
  sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = sp;
  ctx.beginPath(); ctx.arc(-s*0.22,-s*0.35,s*0.28,0,Math.PI*2); ctx.fill();

  ctx.globalAlpha=1;
}

// ══════════════════════════════════════════════
//  SOL CENTRAL
// ══════════════════════════════════════════════
let sunRot=0;
function drawSun(t) {
  sunRot += 0.005;
  const pulse = 1+0.065*Math.sin(t*1.3);
  const size  = 58*SC*pulse;

  // Corona dorada
  ctx.save();
  ctx.globalAlpha = 0.20+0.10*Math.sin(t*1.6);
  const co = ctx.createRadialGradient(CX,CY,size*0.5,CX,CY,size*3.5);
  co.addColorStop(0,'#ffe57f');
  co.addColorStop(0.5,'rgba(255,160,0,0.12)');
  co.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=co;
  ctx.beginPath(); ctx.arc(CX,CY,size*3.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(CX,CY);
  ctx.rotate(sunRot);
  drawRose(size, 5);
  ctx.restore();
}

// ══════════════════════════════════════════════
//  ÓRBITAS
// ══════════════════════════════════════════════
function drawOrbit(rx,ry) {
  ctx.save();
  ctx.translate(CX,CY);
  ctx.strokeStyle='rgba(255,210,70,0.13)';
  ctx.lineWidth=0.85;
  ctx.setLineDash([4,9]);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ══════════════════════════════════════════════
//  PLANETAS
// ══════════════════════════════════════════════
const PLANETS = [
  {rx:82,  ry:40,  oSp:0.032, size:9,  ph:0.8,  rs:0, rSp:0.042},
  {rx:126, ry:60,  oSp:0.022, size:12, ph:2.0,  rs:0, rSp:0.030},
  {rx:172, ry:82,  oSp:0.016, size:14, ph:0.9,  rs:0, rSp:0.025},
  {rx:215, ry:103, oSp:0.012, size:12, ph:3.4,  rs:0, rSp:0.020},
  {rx:265, ry:127, oSp:0.008, size:20, ph:0.2,  rs:0, rSp:0.014},
  {rx:312, ry:149, oSp:0.005, size:17, ph:1.7,  rs:0, rSp:0.012},
  {rx:356, ry:170, oSp:0.003, size:15, ph:4.1,  rs:0, rSp:0.010},
  {rx:392, ry:187, oSp:0.002, size:14, ph:2.8,  rs:0, rSp:0.009},
];

const MOON={orb:34,sp:0.09,ph:0,size:6.5,rs:0,rSp:0.035};

function drawPlanets() {
  for (let i=0; i<PLANETS.length; i++) {
    const p=PLANETS[i];
    p.ph+=p.oSp; p.rs+=p.rSp;
    const rx=p.rx*SC, ry=p.ry*SC;
    drawOrbit(rx,ry);
    const px=CX+Math.cos(p.ph)*rx;
    const py=CY+Math.sin(p.ph)*ry;

    ctx.save();
    ctx.translate(px,py);
    ctx.shadowColor='rgba(255,200,0,0.32)';
    ctx.shadowBlur=p.size*SC*2.5;
    ctx.rotate(p.rs);
    drawRose(p.size*SC,0);
    ctx.restore();

    if (i===4) {
      MOON.ph+=MOON.sp; MOON.rs+=MOON.rSp;
      const mo=MOON.orb*SC;
      const mx=px+Math.cos(MOON.ph)*mo;
      const my=py+Math.sin(MOON.ph)*mo*0.5;

      ctx.save(); ctx.translate(px,py);
      ctx.strokeStyle='rgba(255,220,80,0.18)';
      ctx.lineWidth=0.7; ctx.setLineDash([3,6]);
      ctx.beginPath(); ctx.ellipse(0,0,mo,mo*0.5,0,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();

      ctx.save(); ctx.translate(mx,my);
      ctx.shadowColor='rgba(255,220,80,0.45)';
      ctx.shadowBlur=8;
      ctx.rotate(MOON.rs);
      drawRose(MOON.size*SC,0);
      ctx.restore();
    }
  }
}

// ══════════════════════════════════════════════
//  CINTURÓN DE ASTEROIDES
// ══════════════════════════════════════════════
const ASTEROIDS=Array.from({length:45},()=>({
  ph:Math.random()*Math.PI*2,
  sp:(0.004+Math.random()*0.003)*(Math.random()<.5?1:-1),
  rx:233+Math.random()*22, ry:112+Math.random()*11,
  rs:Math.random()*Math.PI*2,
  rSp:(Math.random()-0.5)*0.045,
  sz:2.5+Math.random()*3,
}));

function drawAsteroids() {
  for (const a of ASTEROIDS) {
    a.ph+=a.sp; a.rs+=a.rSp;
    const ax=CX+Math.cos(a.ph)*a.rx*SC;
    const ay=CY+Math.sin(a.ph)*a.ry*SC;
    ctx.save();
    ctx.translate(ax,ay); ctx.rotate(a.rs);
    ctx.globalAlpha=0.65;
    drawRose(a.sz*SC,0);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ══════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════
let t0=null;
function loop(ts) {
  if (!t0) t0=ts;
  const t=(ts-t0)/1000;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#00000c'; ctx.fillRect(0,0,W,H);

  drawMilkyWay();
  drawStars(t);
  drawNebula();
  drawDust(t);
  drawAsteroids();
  drawPlanets();
  drawSun(t);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
